name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Optimize media for web deployment
        run: |
          sudo apt-get update && sudo apt-get install -y ffmpeg imagemagick

          # === 压缩视频：640p, 去音频, faststart ===
          VDIR="public/media/videos"
          for f in "$VDIR"/*.mp4; do
            echo "Compressing video: $f ($(du -sh "$f" | cut -f1))"
            tmp="${f}.tmp.mp4"
            ffmpeg -i "$f" -c:v libx264 -crf 28 -preset slow -vf "scale=640:-2" -an -movflags +faststart "$tmp" -y 2>/dev/null
            if [ -f "$tmp" ]; then
              mv "$tmp" "$f"
              echo "  → $(du -sh "$f" | cut -f1)"
            fi
          done

          # === 提取视频封面图（第一帧） ===
          for f in "$VDIR"/*.mp4; do
            basename=$(basename "$f" .mp4)
            poster="$VDIR/poster_${basename}.jpg"
            echo "Extracting poster: $poster"
            ffmpeg -i "$f" -vframes 1 -vf "scale=320:-2" -q:v 4 "$poster" -y 2>/dev/null
          done

          # === 压缩图片：最大宽度800px ===
          IDIR="public/media/images"
          for f in "$IDIR"/*.jpg "$IDIR"/*.JPG "$IDIR"/*.png "$IDIR"/*.jpeg; do
            [ -f "$f" ] || continue
            echo "Compressing image: $f ($(du -sh "$f" | cut -f1))"
            convert "$f" -resize '800x>' -quality 80 "$f"
            echo "  → $(du -sh "$f" | cut -f1)"
          done

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
