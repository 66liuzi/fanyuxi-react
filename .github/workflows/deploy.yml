name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Compress videos for web deployment
        run: |
          sudo apt-get update && sudo apt-get install -y ffmpeg
          VDIR="public/media/videos"
          for f in "$VDIR"/*.mp4; do
            echo "Compressing: $f ($(du -sh "$f" | cut -f1))"
            tmp="${f}.tmp.mp4"
            ffmpeg -i "$f" -c:v libx264 -crf 28 -preset slow -vf "scale=640:-2" -an -movflags +faststart "$tmp" -y 2>/dev/null
            if [ -f "$tmp" ]; then
              mv "$tmp" "$f"
              echo "  → $(du -sh "$f" | cut -f1)"
            fi
          done

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
